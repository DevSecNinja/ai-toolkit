name: Markdown Validation

on:
  push:
    branches: [ main ]
    paths:
      - '.apm/prompts/**/*.prompt.md'
      - '.github/prompts/**/*.md'
  pull_request:
    paths:
      - '.apm/prompts/**/*.prompt.md'
      - '.github/prompts/**/*.md'

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Lint markdown files
        continue-on-error: true
        uses: articulate/actions-markdownlint@17b8abe7407cd17590c006ecc837c35e1ac3ed83 # v1.1.0
        with:
          config: .markdownlint.json
          files: '**/*.md'
          ignore: node_modules

  validate-structure:
    name: Validate Prompt Structure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run validation script
        run: |
          bash tests/validate-prompts.sh
