# APM (Agent Package Manager) producer manifest.
# https://microsoft.github.io/apm/producer/
#
# This repository is an APM producer. Consumers can run
#   apm install DevSecNinja/ai-toolkit
# to deploy these primitives as native commands / prompts in their AI harness
# (GitHub Copilot, Claude, Cursor, OpenCode, Gemini, Windsurf).
#
# .apm/ is the single source of truth — primitives are authored directly there.
# INDEX.md and the README index are generated FROM .apm/ by
# scripts/generate-index.sh (the browsable view is derived, not duplicated).
name: ai-toolkit
# Bumped automatically by release-please inside the release PR (see the
# `extra-files` entry in release-please-config.json). The annotation on the
# line below is what the generic updater keys off — keep it intact.
version: 0.3.0 # x-release-please-version
description: A curated, multi-harness toolkit of AI primitives (prompts, instructions, agents and hooks) installable via APM.
author: DevSecNinja
dependencies:
  apm: []
  # MCP servers consumers get wired into their harness on `apm install`.
  # Declarations only — APM materializes them into each harness's MCP config.
  mcp:
    # GitHub MCP server (repos, issues, PRs, Actions, code search). Resolved
    # from the GitHub MCP registry; APM injects the auth token per harness.
    - io.github.github/github-mcp-server
    # Microsoft Learn MCP server — trusted, up-to-date Microsoft/Azure docs and
    # code samples. Public remote server, no authentication required.
    - name: microsoft-learn
      registry: false
      transport: http
      url: https://learn.microsoft.com/api/mcp
# "auto" walks the local .apm/ tree and deploys every primitive it finds.
includes: auto
scripts: {}
